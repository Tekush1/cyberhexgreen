<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="theme-color" content="#05080f" />
    <meta name="description" content="CyberHx — India's Cybersecurity Community. Pentest labs, CTF challenges, and resources." />

    <!-- Preconnect fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <!-- Social meta -->
    <meta property="og:title" content="CyberHx" />
    <meta property="og:description" content="India's Cybersecurity Community — Pentest Labs, CTF, Blog" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />

    <title>CyberHx</title>
  </head>
  <body style="background:#05080f;">
    <div id="root"></div>

    <!-- Loader -->
    <div id="loader" aria-label="Loading" role="progressbar">
      <style>
        #loader {
          position: fixed;
          top: 0; left: 0;
          width: 100%; height: 100%;
          background: #05080f;
          display: flex;
          justify-content: center;
          align-items: center;
          z-index: 9999;
          opacity: 1;
          transition: opacity 0.4s ease-out;
        }
        .loader-content { text-align: center; }
        .logo-text {
          font-family: 'Inter', sans-serif;
          font-size: 1.75rem;
          font-weight: 700;
          color: #f8fafc;
          letter-spacing: -0.02em;
          margin-bottom: 1.5rem;
          opacity: 0;
          transform: translateY(12px);
          animation: fadeUp 0.5s ease forwards 0.1s;
        }
        .logo-text span { color: #a3e635; }
        .progress-bar {
          width: 160px;
          height: 2px;
          background: rgba(163, 230, 53, 0.1);
          border-radius: 2px;
          overflow: hidden;
          margin: 0 auto;
        }
        .progress-fill {
          height: 100%;
          background: #a3e635;
          animation: fill 1.8s ease infinite;
        }
        @keyframes fadeUp {
          to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fill {
          0% { width: 0%; margin-left: 0; }
          50% { width: 100%; margin-left: 0; }
          100% { width: 0%; margin-left: 100%; }
        }
        .loaded #loader { opacity: 0; pointer-events: none; }
      </style>
      <div class="loader-content">
        <div class="logo-text">Cyber<span>Hx</span></div>
        <div class="progress-bar"><div class="progress-fill"></div></div>
      </div>
    </div>

    <script type="module" src="/src/main.tsx"></script>
    <script>
      function initLoader() {
        const loader = document.getElementById('loader');
        if (!loader) return;
        window.addEventListener('load', () => {
          requestAnimationFrame(() => {
            document.body.classList.add('loaded');
            setTimeout(() => { loader.style.display = 'none'; }, 400);
          });
        });
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initLoader);
      } else {
        initLoader();
      }
    </script>
  </body>
</html>
